<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TextPresets</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/badfx-theme.css">
  <link rel="stylesheet" href="css/scroll.css">
  <link rel="stylesheet" href="css/text-tools.css">
  <link rel="stylesheet" href="css/favorites.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>html,body{overflow:hidden;height:100%}</style>
</head>
<body class="badfx-theme">
  <div class="container">
    <div class="header">
      <h1>TextPresets</h1>
      <div class="header-right">
        <button class="favorites-toggle-btn" title="Actualizar"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
        <button class="favorites-toggle-btn" title="Debug"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M20 8h-2.81c-.45-.78-1.07-1.45-1.82-1.96L17 4.41 15.59 3l-2.17 2.17C12.96 5.06 12.49 5 12 5c-.49 0-.96.06-1.41.17L8.41 3 7 4.41l1.62 1.63C7.88 6.55 7.26 7.22 6.81 8H4v2h2.09c-.05.33-.09.66-.09 1v1H4v2h2v1c0 .34.04.67.09 1H4v2h2.81c1.04 1.79 2.97 3 5.19 3s4.15-1.21 5.19-3H20v-2h-2.09c.05-.33.09-.66.09-1v-1h2v-2h-2v-1c0-.34-.04-.67-.09-1H20V8z"/></svg></button>
        <button class="favorites-toggle-btn" title="Favoritos"><span class="star-icon"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></span></button>
      </div>
    </div>
    <div class="tab-content active" id="tab-quick">
      <div class="quick-panel-layout">
        <div class="status-container-top"><div class="status-message">Listo</div></div>
        <div class="quick-animator-scroll">
          <div class="categorized-effects">
            <div class="category">
              <div class="category-header"><span class="category-title">🎨 MIS PRESETS</span><span class="category-icon">▼</span></div>
              <div class="category-content"><div class="effects-grid" id="grid"></div></div>
            </div>
          </div>
        </div>
        <div class="controls-panel-fixed">
          <div class="controls-row">
            <button class="btn-compact" title="Importar"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M19 13h-4V3H9v10H5l7 7 7-7zM5 21v2h14v-2H5z"/></svg></button>
            <button class="btn-compact" title="Guardar"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg></button>
            <button class="btn-compact" title="Renombrar"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>
            <button class="btn-compact" title="Borrar"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
            <button class="btn-compact" title="SRT"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg></button>
            <button class="btn-compact" title="Reset"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
            <button class="btn-compact" title="Keys"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:#fc9300"><path d="M12 2L2 12l10 10 10-10L12 2z"/></svg></button>
            <button class="btn-compact btn-text-exploder" title="Tx"><span class="btn-compact-tx">Tx</span></button>
          </div>
          <div class="apply-buttons-row"><button class="btn-apply btn-apply-main" id="apply">✓ APLICAR</button></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    var starFilled='<svg class="favorite-star-icon" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';
    var starOut='<svg class="favorite-star-icon" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.65" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27z"/></svg>';
    var presets=[
      {n:'Blinking Cursor Typewriter Console',f:false},
      {n:'Bounce Pro',f:true},{n:'Lines Bounce',f:true},{n:'Smooth Character Up In',f:true},
      {n:'Smooth Character Left',f:false},{n:'Sticky',f:true},{n:'Stretch In Each Word',f:true}
    ];
    var g=document.getElementById('grid');
    presets.forEach(function(p,i){
      var btn=document.createElement('div');
      btn.className='effect-btn'+(i===1?' selected-entrance':'');
      var name=document.createElement('div');name.className='effect-name';name.textContent='🎬 '+p.n;
      var star=document.createElement('button');star.className='favorite-star'+(p.f?' favorited':'');star.innerHTML=p.f?starFilled:starOut;
      star.onclick=function(e){e.stopPropagation();p.f=!p.f;star.classList.toggle('favorited',p.f);star.innerHTML=p.f?starFilled:starOut;};
      btn.appendChild(name);btn.appendChild(star);
      btn.onclick=function(e){if(e.target.closest('.favorite-star'))return;document.querySelectorAll('.effect-btn').forEach(function(x){x.classList.remove('selected','selected-entrance','selected-exit');});btn.classList.add('selected-entrance');};
      g.appendChild(btn);
    });
    document.getElementById('apply').onclick=function(){var t=this;t.textContent='✓ Aplicado';setTimeout(function(){t.textContent='✓ APLICAR';},900);};
  </script>
</body>
</html>
