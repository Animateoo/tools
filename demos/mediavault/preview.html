<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>MediaVault</title>
<link rel="stylesheet" href="css/app.css">
<style>
html,body{height:100%;overflow:hidden}
.asset-grid{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:10px 12px}
.asset-grid.is-hidden{display:grid!important}
#welcome-state,#asset-list{display:none!important}
.statusbar span:last-child{font-size:9px;color:var(--text-muted)}
.card-wave{width:100%;height:100%;display:block}
</style>
</head>
<body>
<div id="app" class="app">
  <header class="header">
    <div class="header-brand">
      <div class="logo"><svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M7 6.5l4 2.5-4 2.5V6.5z" fill="currentColor" stroke="none"/></svg></div>
      <div class="header-brand-text"><h1 class="title">MediaVault</h1><p class="subtitle">After Effects</p></div>
    </div>
    <div class="header-actions">
      <button type="button" class="btn-accent">Vincular carpeta</button>
      <button type="button" class="icon-btn" title="Ajustes">☀</button>
    </div>
  </header>
  <div class="workspace">
    <aside class="sidebar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="13.5" y2="13.5"/></svg>
        <input type="search" placeholder="Buscar medios…">
      </div>
      <div class="sidebar-section-label">Bibliotecas</div>
      <div class="mv-tree-panel has-active">
        <div class="mv-tree-row active"><span class="mv-tgl">▾</span> AUDIOS</div>
        <div class="mv-tree-row mv-tree-sub">Sounds FX</div>
        <div class="mv-tree-row mv-tree-sub active"><span class="mv-tgl">▾</span> Essential Sounds Effects</div>
        <div class="mv-tree-row mv-tree-sub" style="padding-left:22px">Approach</div>
        <div class="mv-tree-row mv-tree-sub" style="padding-left:22px">Bass</div>
        <div class="mv-tree-row mv-tree-sub" style="padding-left:22px">Beep</div>
        <div class="mv-tree-row mv-tree-sub" style="padding-left:22px">Bleep</div>
        <div class="mv-tree-row mv-tree-sub" style="padding-left:22px">Boom (+)</div>
      </div>
    </aside>
    <div class="content-col">
      <div class="toolbar">
        <div class="toolbar-left"><span class="breadcrumb">Sounds FX / Essential S…</span></div>
        <div class="toolbar-right">
          <button type="button" class="view-btn">≡</button>
          <button type="button" class="view-btn active">⊞</button>
          <div class="size-toggle" title="Tamaño">
            <button type="button" class="size-btn active">M</button>
            <button type="button" class="size-btn">L</button>
            <button type="button" class="size-btn">XL</button>
          </div>
          <button type="button" class="tool-btn" title="Favoritos">★</button>
        </div>
      </div>
      <div class="grid-scroll">
        <div class="asset-grid" id="grid"></div>
      </div>
    </div>
  </div>
  <footer class="statusbar">
    <span>20 archivos</span>
    <span>Arrastrar → timeline · Doble clic → timeline · Ctrl+B → biblioteca · Esc → cerrar preview</span>
  </footer>
</div>
<script>
var names=['Bells 1 Downward','Bells 1 Upward 01','Bells 1 Upward 02','Bells 2 Downward','Bells 2 Upward 01','Bells 2 Upward 02','Bells 3 Downward','Bells 3 Upward'];
var grid=document.getElementById('grid');
var AUDIO_ICON='<svg class="mv-icon" viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M3.5 10V6.5a2 2 0 0 1 4 0V10a2 2 0 0 1-4 0z"/><path d="M7.5 7.5V4.5a2.5 2.5 0 0 1 5 0V10a2 2 0 0 1-4 0"/></svg>';
function genBellPeaks(n,seed){
  var p=[],i,t,attack,decay,v;
  for(i=0;i<n;i++){
    t=i/(n-1);
    attack=t<0.06?t/0.06:1;
    decay=Math.exp(-Math.max(0,t-0.04)*(2.8+(seed%5)*0.35));
    v=attack*decay*(0.88+0.12*Math.sin(seed*1.3+i*0.15));
    if(i%17===0)v*=0.55;
    p.push(Math.max(0.05,Math.min(1,v)));
  }
  return p;
}
function drawBarWave(canvas,seed){
  var wrap=canvas.parentElement,rect=wrap?wrap.getBoundingClientRect():{width:140,height:67};
  var w=Math.max(72,Math.floor(rect.width)),h=Math.max(30,Math.floor(rect.height||67));
  var dpr=window.devicePixelRatio||1;
  canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  var ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  var padX=3,padY=2,barW=w<100?1:1.5,barGap=w<120?1:2;
  ctx.fillStyle='#141414';ctx.fillRect(0,0,w,h);
  var yCenter=h/2,halfH=Math.max(3,(h-padY*2)/2);
  ctx.strokeStyle='rgba(255,255,255,0.14)';ctx.lineWidth=1;ctx.setLineDash([2,3]);
  ctx.beginPath();ctx.moveTo(padX,yCenter+0.5);ctx.lineTo(w-padX,yCenter+0.5);ctx.stroke();ctx.setLineDash([]);
  var peaks=genBellPeaks(120,seed),innerW=Math.max(1,w-padX*2),step=barW+barGap;
  var barCount=Math.max(6,Math.floor(innerW/step)),maxP=0,i;
  for(i=0;i<peaks.length;i++)maxP=Math.max(maxP,peaks[i]);
  if(!maxP)maxP=1;
  var scale=(halfH*0.9)/maxP;
  ctx.fillStyle='rgba(255,255,255,0.78)';
  for(i=0;i<barCount;i++){
    var peakIdx=Math.min(peaks.length-1,Math.floor((i/barCount)*peaks.length));
    var barH=Math.max(0.5,(peaks[peakIdx]||0)*scale);
    var x=padX+i*step;
    ctx.fillRect(x,yCenter-barH,barW,barH*2);
  }
  ctx.strokeStyle='rgba(255,255,255,0.42)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padX+0.5,1);ctx.lineTo(padX+0.5,h-1);ctx.stroke();
}
function mountWave(canvas,seed){
  requestAnimationFrame(function(){drawBarWave(canvas,seed);});
}
names.forEach(function(name,i){
  var card=document.createElement('article');card.className='asset-card mv-grid-card'+(i===0?' selected':'');
  var wave=document.createElement('div');wave.className='card-wave-wrap type-audio';
  var c=document.createElement('canvas');c.className='card-wave';wave.appendChild(c);
  var foot=document.createElement('div');foot.className='asset-foot mv-card-foot';
  foot.innerHTML='<span class="card-type-icon type-audio">'+AUDIO_ICON+'</span><span class="card-title">'+name+'</span><button type="button" class="fav-btn" title="Favorito">☆</button>';
  card.appendChild(wave);card.appendChild(foot);
  card.onclick=function(){document.querySelectorAll('.asset-card').forEach(function(x){x.classList.remove('selected');});card.classList.add('selected');};
  grid.appendChild(card);mountWave(c,i*2.3+1.1);
});
window.addEventListener('resize',function(){
  document.querySelectorAll('.card-wave').forEach(function(c,i){drawBarWave(c,i*2.3+1.1);});
});
</script>
</body>
</html>
