<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Shuttle</title>
  <link rel="stylesheet" href="../css/shuttle.css"/>
</head>
<body>
  <script src="../js/libs/CSInterface.js"></script>
  <script src="../js/libs/Vulcan.js"></script>

  <div id="panel" class="panel">

    <!-- Message overlay -->
    <div id="msg" class="msg"></div>

    <!-- Illustrator panel -->
    <div id="ai-panel" class="app-panel" style="display:none;">

      <!-- Push to Photoshop -->
      <a id="ai-push" class="func" title="Push to Photoshop">
        <svg viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path class="shape hover-ps" d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline class="shape hover-ps" points="17 8 12 3 7 8"></polyline>
          <line class="shape hover-ps" x1="12" y1="3" x2="12" y2="15"></line>
        </g></svg>
      </a>

      <!-- Pull from Photoshop -->
      <a id="ai-pull" class="func" title="Pull from Photoshop">
        <svg viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path class="shape hover-ps" d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline class="shape hover-ps" points="7 10 12 15 17 10"></polyline>
          <line class="shape hover-ps" x1="12" y1="15" x2="12" y2="3"></line>
        </g></svg>
      </a>

      <!-- (Removed) Transfer options now always enabled in Push -->

      <!-- Switch to Ps -->
      <a id="ai-switch" class="func" title="Switch to Photoshop">
        <svg viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect class="shape hover-ps" x="2" y="2" width="20" height="20" rx="3"></rect>
          <text x="12" y="16" class="shape hover-ps" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="12" stroke="none" fill="currentColor">Ps</text>
        </g></svg>
      </a>

      <!-- Debug Ai -->
      <a id="ai-debug" class="func debug-btn" title="Diagnóstico de Errores">
        <svg viewBox="0 0 24 24"><g fill="none" class="shape hover-warn" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 7h-6a3 3 0 0 0-3 3v5a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3v-5a3 3 0 0 0-3-3z"></path>
          <path d="M9 13H6M15 13h3M9 10h.01M15 10h.01M12 20v-2M12 7V5"></path>
        </g></svg>
      </a>

    </div>

    <!-- Photoshop panel -->
    <div id="ps-panel" class="app-panel" style="display:none;">

      <!-- Push to Illustrator -->
      <a id="ps-push" class="func" title="Push to Illustrator">
        <svg viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path class="shape hover-ai" d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline class="shape hover-ai" points="17 8 12 3 7 8"></polyline>
          <line class="shape hover-ai" x1="12" y1="3" x2="12" y2="15"></line>
        </g></svg>
      </a>

      <!-- Pull from Illustrator -->
      <a id="ps-pull" class="func" title="Pull from Illustrator">
        <svg viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path class="shape hover-ai" d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline class="shape hover-ai" points="7 10 12 15 17 10"></polyline>
          <line class="shape hover-ai" x1="12" y1="15" x2="12" y2="3"></line>
        </g></svg>
      </a>

      <!-- (Removed) Transfer options now always enabled in Push -->

      <!-- Switch to Ai -->
      <a id="ps-switch" class="func" title="Switch to Illustrator">
        <svg viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect class="shape hover-ai" x="2" y="2" width="20" height="20" rx="3"></rect>
          <text x="12" y="16" class="shape hover-ai" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="12" stroke="none" fill="currentColor">Ai</text>
        </g></svg>
      </a>

      <!-- Debug Ps -->
      <a id="ps-debug" class="func debug-btn" title="Diagnóstico (Toggle Console)">
        <svg viewBox="0 0 24 24"><g fill="none" class="shape hover-warn" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 7h-6a3 3 0 0 0-3 3v5a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3v-5a3 3 0 0 0-3-3z"></path>
          <path d="M9 13H6M15 13h3M9 10h.01M15 10h.01M12 20v-2M12 7V5"></path>
        </g></svg>
      </a>

    </div>
  </div>

  <!-- Console Box logically separated below the main panel -->
  <div id="console-panel" class="console-box" style="display:none;">
    <div class="console-actions">
      <button id="btn-deep-scan" style="color: #31a8ff; font-weight: bold;">🔍 Deep Scan</button>
      <div>
        <button id="btn-copy-log" title="Copiar logs">📋 Copiar</button>
        <button id="btn-clear-log" title="Limpiar consola">🗑</button>
      </div>
    </div>
    <div id="console-log" class="console-log"></div>
  </div>

  <script src="../js/shuttle.js"></script>
</body>
</html>
