<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#262626;font:11px Tahoma,'Segoe UI',sans-serif;color:#ccc;overflow:hidden}
.shell{display:flex;flex-direction:column;height:100%}
.win{padding:10px;flex:1;background:#1e1e1e}
.row{display:flex;gap:6px}
.btn{width:42px;height:42px;flex:0 0 42px;border:none;background:transparent;cursor:pointer;padding:0;transition:transform .12s ease}
.btn:active,.btn.active{transform:scale(0.94)}
.btn canvas{display:block;width:42px;height:42px}
.toast{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#f6d32d;font:bold 10px Tahoma;padding:4px 10px;border-radius:3px;border:1px solid rgba(246,211,45,.3);opacity:0;pointer-events:none;transition:opacity .2s;z-index:9;white-space:nowrap;max-width:92vw;text-align:center}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">
  <div class="win"><div class="row" id="row"></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(function(){t.classList.remove('show');},1600);
}
function renderIcon(ctx,w,h,type,hover){
  var bg=hover?36:20;
  ctx.fillStyle='rgb('+bg+','+bg+','+bg+')';
  ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgb(13,13,13)';ctx.lineWidth=1;ctx.strokeRect(0.5,0.5,w-1,h-1);
  var cx=w/2,cy=h/2,fill=hover?'rgb(255,255,255)':'rgb(191,191,191)';
  ctx.fillStyle=fill;ctx.strokeStyle=fill;ctx.lineWidth=1.5;
  function dot(x,y){ctx.fillRect(x-1.5,y-1.5,3,3);}
  if(type==='unlink'){
    ctx.fillRect(cx-9,cy-2,9,9);ctx.strokeRect(cx+1,cy-9,9,9);
    [[cx+1,cy-9],[cx+10,cy-9],[cx+1,cy],[cx+10,cy]].forEach(function(n){dot(n[0],n[1]);});
  }else if(type==='relink'){
    ctx.fillRect(cx-5,cy-5,10,10);ctx.strokeRect(cx-8,cy-8,16,16);
    [[cx-8,cy-8],[cx+8,cy-8],[cx-8,cy+8],[cx+8,cy+8]].forEach(function(n){dot(n[0],n[1]);});
  }else if(type==='mask2shape'){
    ctx.strokeRect(cx-13,cy-5,8,8);
    [[cx-13,cy-5],[cx-5,cy-5],[cx-13,cy+3],[cx-5,cy+3]].forEach(function(n){dot(n[0],n[1]);});
    ctx.beginPath();ctx.moveTo(cx-1,cy);ctx.lineTo(cx+3,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+2,cy-2);ctx.lineTo(cx+4,cy);ctx.lineTo(cx+2,cy+2);ctx.stroke();
    ctx.fillRect(cx+5,cy-5,8,8);
  }else if(type==='shape2mask'){
    ctx.fillRect(cx-13,cy-5,8,8);
    ctx.beginPath();ctx.moveTo(cx-1,cy);ctx.lineTo(cx+3,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+2,cy-2);ctx.lineTo(cx+4,cy);ctx.lineTo(cx+2,cy+2);ctx.stroke();
    ctx.strokeRect(cx+5,cy-5,8,8);
    [[cx+5,cy-5],[cx+13,cy-5],[cx+5,cy+3],[cx+13,cy+3]].forEach(function(n){dot(n[0],n[1]);});
  }else if(type==='separate'){
    ctx.strokeRect(cx-12,cy-5,8,10);ctx.strokeRect(cx+4,cy-5,8,10);
    [[cx-12,cy-5],[cx-4,cy-5],[cx-12,cy+5],[cx-4,cy+5],[cx+4,cy-5],[cx+12,cy-5],[cx+4,cy+5],[cx+12,cy+5]].forEach(function(n){dot(n[0],n[1]);});
    ctx.beginPath();ctx.moveTo(cx-2,cy-1);ctx.lineTo(cx-5,cy-1);ctx.lineTo(cx-3,cy-3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-5,cy-1);ctx.lineTo(cx-3,cy+1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+2,cy+1);ctx.lineTo(cx+5,cy+1);ctx.lineTo(cx+3,cy-1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+5,cy+1);ctx.lineTo(cx+3,cy+3);ctx.stroke();
  }
}
var tools=['unlink','relink','mask2shape','shape2mask','separate'];
var actions={
  unlink:'Unlink: expresión //MaskUnlinker en paths de máscara seleccionados',
  relink:'Relink: hornea valor y desactiva expresión de la máscara',
  mask2shape:'Mask→Shape: crea capa shape desde máscara con fill gris',
  shape2mask:'Shape→Mask: convierte paths shape en máscaras en capa destino',
  separate:'Separate: duplica capa por cada máscara y elimina original'
};
var labels={unlink:'Unlink mask',relink:'Relink mask',mask2shape:'Mask → Shape',shape2mask:'Shape → Mask',separate:'Separate masks'};
var row=document.getElementById('row');
tools.forEach(function(type){
  var btn=document.createElement('button');btn.className='btn';btn.type='button';btn.title=labels[type];btn.dataset.tool=type;
  var c=document.createElement('canvas');c.width=42;c.height=42;btn.appendChild(c);
  var ctx=c.getContext('2d');
  function paint(hov){renderIcon(ctx,42,42,type,hov||btn.classList.contains('active'));}
  paint(false);
  btn.onmouseenter=function(){if(!btn.classList.contains('active'))paint(true);};
  btn.onmouseleave=function(){if(!btn.classList.contains('active'))paint(false);};
  btn.onmousedown=function(e){
    e.preventDefault();
    row.querySelectorAll('.btn').forEach(function(b){
      b.classList.remove('active');
      renderIcon(b.querySelector('canvas').getContext('2d'),42,42,b.dataset.tool,false);
    });
    btn.classList.add('active');paint(true);
    showToast(actions[type]);
  };
  row.appendChild(btn);
});
</script>
</body>
</html>
