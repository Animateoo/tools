<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#262626;font:11px Tahoma,'Segoe UI',sans-serif;color:#ccc;overflow:hidden}
.shell{display:flex;flex-direction:column;width:100%;position:relative}
.titlebar{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:#323232;color:#e0e0e0;font-size:12px;border-bottom:1px solid #1a1a1a}
.titlebar button{background:none;border:none;color:#ccc;font-size:14px;cursor:pointer;padding:2px 4px}
.win{display:flex;flex-direction:column;padding:6px;gap:4px;background:#262626}
.topbar{display:flex;align-items:center;gap:3px}
.hex-group{display:flex;align-items:center;gap:2px;min-width:0}
.chip{width:24px;height:22px;border:1px solid #737373;background:#262626;cursor:pointer;position:relative;flex-shrink:0}
.chip-fill{position:absolute;left:3px;top:3px;right:3px;bottom:3px;background:#fff}
.hex{width:65px;height:22px;border:1px solid #555;background:#1f1f1f;color:#fff;padding:1px 4px;font:11px monospace}
.btn{border:1px solid #555;background:#3a3a3a;color:#bbb;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn svg{pointer-events:none;display:block}
.btn-sm{width:24px;height:22px}.btn-sm svg{width:11px;height:11px}
.btn-lg{width:28px;height:24px}.btn-lg svg{width:14px;height:14px}
.btn:hover{background:#454545;color:#eee}
.btn:active{transform:scale(0.96)}
.spacer{flex:1}
.label{font:bold 10px Tahoma;color:#aaa;text-transform:uppercase}
.swatch-grid{display:flex;flex-direction:column;gap:3px}
.swatch-row{display:flex;gap:3px}
.swatch{flex:1;height:24px;border:1px solid rgba(0,0,0,.45);cursor:pointer}
.swatch:hover{outline:1px solid #fff}
.bottom{display:flex;gap:2px;align-items:center}
.dropdown{flex:1;height:22px;border:1px solid #555;background:#1f1f1f;color:#ccc;font:11px Tahoma;padding:0 4px}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:20;padding:8px}
.modal-backdrop.open{display:flex}
.modal{width:100%;max-width:240px;background:#3a3a3a;border:1px solid #555;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.modal--wide{max-width:280px}
.modal-title{background:#323232;padding:6px 8px;font:bold 11px Tahoma;color:#e8e8e8;border-bottom:1px solid #2a2a2a}
.modal-body{padding:8px;display:flex;flex-direction:column;gap:6px}
.modal-body label{font-size:10px;color:#aaa}
.modal-body input,.modal-body textarea,.modal-body select{width:100%;border:1px solid #555;background:#1f1f1f;color:#fff;font:11px Tahoma;padding:4px 6px}
.modal-body textarea{min-height:120px;resize:vertical;font-family:Consolas,monospace;font-size:10px;line-height:1.45}
.modal-foot{display:flex;justify-content:flex-end;gap:4px;padding:6px 8px;border-top:1px solid #2a2a2a}
.modal-foot button{min-width:58px;height:22px;border:1px solid #555;background:#454545;color:#ddd;font:11px Tahoma;cursor:pointer;padding:0 8px}
.modal-foot button:hover{background:#555;color:#fff}
.modal-foot .ok{background:#4a6fa5;border-color:#5a7fb5}
.modal-foot .choice{flex:1;max-width:none}
.modal-hint{font-size:10px;color:#999;line-height:1.4}
.file-row{display:flex;gap:4px;align-items:center}
.file-row input[type=file]{display:none}
.file-btn{flex:1;height:22px;border:1px solid #555;background:#2a2a2a;color:#ccc;font:10px Tahoma;cursor:pointer;padding:0 6px;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-btn:hover{background:#333}
/* AE native — Clear Disk Cache */
.ae-native{max-width:340px;background:#2b2b2b;border:1px solid #111;box-shadow:0 12px 40px rgba(0,0,0,.65);border-radius:6px;overflow:hidden}
.ae-native-title{background:#f0ebe3;color:#222;padding:7px 10px;font:12px 'Segoe UI',Tahoma,sans-serif;border-bottom:1px solid #c8c0b8;display:flex;justify-content:space-between;align-items:center}
.ae-native-title button{background:none;border:none;color:#666;font-size:14px;cursor:pointer;line-height:1}
.ae-native-body{padding:14px 14px 10px;color:#d8d8d8;font:12px 'Segoe UI',Tahoma,sans-serif;line-height:1.45}
.ae-native-check{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:#aaa}
.ae-native-check input{margin:0}
.ae-native-foot{display:flex;justify-content:flex-end;gap:6px;padding:10px 12px 12px}
.ae-native-foot button{min-width:72px;height:26px;border:1px solid #555;border-radius:3px;font:12px 'Segoe UI',Tahoma;cursor:pointer}
.ae-native-foot .cancel{background:#3a3a3a;color:#eee}
.ae-native-foot .ok{background:#1473e6;color:#fff;border-color:#0d5bbf;box-shadow:0 0 0 1px #1473e6}
.toast{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#f6d32d;font:bold 10px Tahoma;padding:4px 8px;border-radius:3px;border:1px solid rgba(246,211,45,.3);opacity:0;pointer-events:none;transition:opacity .2s;z-index:30;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">
  <div class="titlebar"><span>Aura Pro</span><button type="button" id="menuBtn" aria-label="Menú">☰</button></div>
  <div class="win">
    <div class="topbar">
      <div class="hex-group">
        <div class="chip" id="chip"><div class="chip-fill" id="chipFill"></div></div>
        <input class="hex" id="hex" value="#FFFFFF">
        <button class="btn btn-sm" type="button" id="addColorBtn" title="Añadir color a paleta">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
        </button>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-lg" type="button" id="stroke" title="Trazo fill/stroke">
        <svg id="strokeIcon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="2.5" y="2.5" width="11" height="11" rx="0.5"/><rect x="2.5" y="2.5" width="5.5" height="11" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="btn btn-lg" type="button" id="swapBtn" title="Swap colores">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M11 5.5H3.5M5.5 3.5L3.5 5.5L5.5 7.5"/><path d="M5 10.5h7.5M10.5 12.5L12.5 10.5L10.5 8.5"/></svg>
      </button>
      <button class="btn btn-lg" type="button" id="importBtn" title="Importar JSON">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2.5 5.5h3.5l1-1.5h4.5a1 1 0 0 1 1 1v7H2.5V5.5z"/></svg>
      </button>
      <button class="btn btn-lg" type="button" id="exportBtn" title="Exportar JSON">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M4 3.5h5l2.5 2.5V13H4V3.5z"/><path d="M9 3.5v2.5h2.5"/></svg>
      </button>
    </div>
    <div class="label" id="palLabel">DIDI PRÉSTAMOS (7)</div>
    <div class="swatch-grid" id="swatches"></div>
    <div class="bottom">
      <select class="dropdown" id="dropdown"></select>
      <button class="btn btn-sm" type="button" id="newPalBtn" title="Nueva paleta">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
      </button>
      <button class="btn btn-sm" type="button" id="delPalBtn" title="Eliminar paleta">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 8h10"/></svg>
      </button>
      <button class="btn btn-sm" type="button" id="renamePalBtn" title="Renombrar paleta">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M3 12.5l1-3.5 7.5-7.5 2.5 2.5-7.5 7.5-3.5 1z"/><path d="M9.5 4.5l2 2"/></svg>
      </button>
    </div>
  </div>
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-title" id="modalTitle">Diálogo</div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot">
        <button type="button" id="modalCancel">Cancelar</button>
        <button type="button" class="ok" id="modalOk">Aceptar</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
var COLS=6;
var palettes={
  'DiDi Préstamos':['#A9D2A1','#FC4C02','#0056EF','#FFBC00','#F5EDEB','#3A2932','#FFFFFF'],
  'DiDi Principal':['#FC4C02','#F5EDEB','#3A2932','#FFBC00','#0056EF','#720085','#3AA537','#FFFFFF','#000000'],
  'DiDi Card':['#FC4C02','#FC765B','#E4572E','#FFBC00','#F5EDEB','#FFC8BD','#FFE7E4','#FFF1EF','#F0F0F0']
};
var chipFill=document.getElementById('chipFill'),hex=document.getElementById('hex'),sw=document.getElementById('swatches'),dd=document.getElementById('dropdown'),lbl=document.getElementById('palLabel');
var backdrop=document.getElementById('modalBackdrop'),modalTitle=document.getElementById('modalTitle'),modalBody=document.getElementById('modalBody'),modalOk=document.getElementById('modalOk'),modalCancel=document.getElementById('modalCancel'),toastEl=document.getElementById('toast');
var strokeFill=true,modalAction=null,toastTimer;

function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){toastEl.classList.remove('show');},1500);}
function setChip(c){chipFill.style.background=c;}
function currentPal(){return dd.value;}
function syncDropdown(selectName){
  dd.innerHTML='';
  Object.keys(palettes).forEach(function(name){
    var o=document.createElement('option');o.value=name;o.textContent=name;dd.appendChild(o);
  });
  if(selectName&&palettes[selectName])dd.value=selectName;
  else if(!palettes[dd.value])dd.selectedIndex=0;
}
function render(name){
  var colors=palettes[name]||[];
  lbl.textContent=name.toUpperCase()+' ('+colors.length+')';
  sw.innerHTML='';
  var row,i,c,s;
  for(i=0;i<colors.length;i++){
    if(i%COLS===0){row=document.createElement('div');row.className='swatch-row';sw.appendChild(row);}
    c=colors[i];
    s=document.createElement('div');s.className='swatch';s.style.background=c;
    s.onclick=function(col){return function(){hex.value=col;setChip(col);};}(c);
    row.appendChild(s);
  }
}
function openModal(title,bodyHtml,okLabel,onOk){
  modalTitle.textContent=title;
  modalBody.innerHTML=bodyHtml;
  modalOk.textContent=okLabel||'Aceptar';
  backdrop.classList.add('open');
  modalAction=onOk;
  var first=modalBody.querySelector('input,textarea,select');
  if(first)setTimeout(function(){first.focus();first.select&&first.select();},30);
}
function closeModal(){
  backdrop.classList.remove('open');
  modalAction=null;
  modalOk.className='ok';
  modalOk.onclick=function(){if(modalAction)modalAction();};
  document.querySelectorAll('.modal-foot .choice-extra').forEach(function(b){b.remove();});
  var m=document.querySelector('.modal');if(m)m.classList.remove('modal--wide');
}
modalCancel.onclick=closeModal;
backdrop.onclick=function(e){if(e.target===backdrop)closeModal();};
modalOk.onclick=function(){if(modalAction)modalAction();};

document.getElementById('newPalBtn').onclick=function(){
  openModal('Nueva paleta','<label>Nombre de la biblioteca</label><input id="mInput" placeholder="Mi marca / cliente">','Crear',function(){
    var name=(document.getElementById('mInput').value||'').trim();
    if(!name){toast('Escribe un nombre');return;}
    if(palettes[name]){toast('Ya existe');return;}
    palettes[name]=['#FFFFFF','#000000','#F6D32D'];
    syncDropdown(name);render(name);closeModal();toast('Paleta creada');
  });
};
document.getElementById('renamePalBtn').onclick=function(){
  var cur=currentPal();
  openModal('Renombrar paleta','<label>Nuevo nombre</label><input id="mInput" value="'+cur.replace(/"/g,'&quot;')+'">','Guardar',function(){
    var name=(document.getElementById('mInput').value||'').trim();
    if(!name||name===cur){closeModal();return;}
    if(palettes[name]){toast('Nombre en uso');return;}
    palettes[name]=palettes[cur];delete palettes[cur];
    syncDropdown(name);render(name);closeModal();toast('Renombrada');
  });
};
document.getElementById('delPalBtn').onclick=function(){
  if(Object.keys(palettes).length<2){toast('Mínimo 1 paleta');return;}
  var cur=currentPal();
  openModal('Eliminar paleta','<p class="modal-hint">¿Eliminar <strong>'+cur+'</strong>? Esta acción no se puede deshacer en AE.</p>','Eliminar',function(){
    delete palettes[cur];
    syncDropdown();render(currentPal());closeModal();toast('Paleta eliminada');
  });
};
document.getElementById('addColorBtn').onclick=function(){
  openModal('Añadir color','<label>HEX</label><input id="mInput" value="'+hex.value+'">','Añadir',function(){
    var c=(document.getElementById('mInput').value||'').trim();
    if(!/^#?[0-9A-Fa-f]{6}$/.test(c.replace('#',''))){toast('HEX inválido');return;}
    if(c[0]!=='#')c='#'+c;
    palettes[currentPal()].push(c.toUpperCase());
    hex.value=c.toUpperCase();setChip(c);render(currentPal());closeModal();toast('Color añadido');
  });
};
document.getElementById('importBtn').onclick=function(){
  openModal('Importar paletas','<label>Archivo .json</label><div class="file-row"><input type="file" id="mFile" accept=".json,application/json"><button type="button" class="file-btn" id="mFileBtn">Seleccionar archivo .json…</button></div><p class="modal-hint">Mismo flujo que en AE: abre un .json exportado por Aura Pro.</p>','Importar',function(){
    var fileInput=document.getElementById('mFile');
    if(!fileInput.files||!fileInput.files[0]){toast('Elige un archivo');return;}
    var reader=new FileReader();
    reader.onload=function(){
      try{
        var data=JSON.parse(reader.result);
        function applyImport(mode){
          if(data.palettes&&Array.isArray(data.palettes)){
            if(mode===0){palettes={};data.palettes.forEach(function(p){palettes[p.name]=p.colors.slice();});}
            else{data.palettes.forEach(function(p){palettes[p.name]=p.colors.slice();});}
          }else if(data.name&&Array.isArray(data.colors)){
            palettes[data.name]=data.colors.slice();
          }else{toast('Formato .json no válido');return;}
          syncDropdown();render(currentPal());closeModal();toast('Importación completada');
        }
        if(data.palettes&&Array.isArray(data.palettes)){
          closeModal();
          openModal('Importar paletas','<p class="modal-hint">¿Cómo importar las paletas del archivo?</p>','',null);
          modalOk.textContent='Añadir al final';modalOk.className='ok choice';
          var extra=document.createElement('button');extra.type='button';extra.className='choice choice-extra';extra.textContent='Reemplazar todas';
          extra.style.cssText='min-width:58px;height:22px;border:1px solid #555;background:#454545;color:#ddd;font:11px Tahoma;cursor:pointer;padding:0 8px';
          var foot=document.querySelector('.modal-foot');foot.insertBefore(extra,modalCancel);
          extra.onclick=function(){applyImport(0);};
          modalOk.onclick=function(){applyImport(1);};
        }else{applyImport(1);}
      }catch(e){toast('JSON inválido');}
    };
    reader.readAsText(fileInput.files[0]);
  });
  setTimeout(function(){
    var fi=document.getElementById('mFile'),fb=document.getElementById('mFileBtn');
    if(fb&&fi){fb.onclick=function(){fi.click();};fi.onchange=function(){if(fi.files[0])fb.textContent=fi.files[0].name;};}
  },40);
};
document.getElementById('exportBtn').onclick=function(){
  var exportData={
    activePaletteIndex:Object.keys(palettes).indexOf(currentPal()),
    palettes:Object.keys(palettes).map(function(name){return{name:name,colors:palettes[name].slice()};})
  };
  openModal('Exportar paletas','<textarea id="mInput" readonly></textarea><p class="modal-hint">Copia este JSON o descárgalo — igual que el export de Aura Pro (.json).</p>','Copiar',function(){});
  document.querySelector('.modal').classList.add('modal--wide');
  document.getElementById('mInput').value=JSON.stringify(exportData,null,4);
  modalOk.textContent='Copiar';
  modalAction=function(){
    var t=document.getElementById('mInput');t.select();
    try{navigator.clipboard.writeText(t.value);}catch(e){document.execCommand('copy');}
    var blob=new Blob([t.value],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='aura-paletas.json';a.click();
    closeModal();toast('JSON copiado');
  };
};
document.getElementById('swapBtn').onclick=function(){
  var p=palettes[currentPal()];
  if(p.length>1){var t=p[0];p[0]=p[p.length-1];p[p.length-1]=t;render(currentPal());toast('Swap');}
};
document.getElementById('menuBtn').onclick=function(){
  openModal('Aura Pro','<p class="modal-hint">Demo web — en After Effects este menú abre preferencias, sync y ayuda.</p>','Entendido',closeModal);
};

syncDropdown('DiDi Préstamos');render('DiDi Préstamos');setChip('#FFFFFF');
dd.onchange=function(){render(this.value);};
hex.oninput=function(){setChip(this.value);};
document.getElementById('stroke').onclick=function(){
  strokeFill=!strokeFill;
  document.getElementById('strokeIcon').innerHTML=strokeFill
    ?'<rect x="2.5" y="2.5" width="11" height="11" rx="0.5"/><rect x="2.5" y="2.5" width="5.5" height="11" fill="currentColor" stroke="none"/>'
    :'<rect x="2.5" y="2.5" width="11" height="11" rx="0.5"/><rect x="8" y="2.5" width="5.5" height="11" fill="currentColor" stroke="none"/>';
  toast(strokeFill?'Fill':'Stroke');
};
</script>
</body>
</html>
