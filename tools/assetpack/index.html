<body class="tools-body">
    <header class="tools-header">
        <div class="tools-container tools-header-inner">
            <a class="tools-logo" href="../../">Animateo</a>
            <nav class="tools-nav">
                <a href="../">Tools</a>
                <a href="https://github.com/Animateoo" target="_blank" rel="noopener">GitHub</a>
